<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #dbeafe, #eff6ff, #f8fafc);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
        }

        h1{
            text-align:center;
            color:#1e3a8a;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            color:#64748b;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
            color:#334155;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:18px;
            border:1px solid #cbd5e1;
            border-radius:8px;
            font-size:15px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

        .error{
            background:#fee2e2;
            color:#b91c1c;
            padding:10px;
            border-radius:8px;
            margin-bottom:15px;
            text-align:center;
        }

        .back{
            text-align:center;
            margin-top:18px;
        }

        .back a{
            text-decoration:none;
            color:#2563eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sign In</h1>
        <p>Login to access your dashboard</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label for="id_username">Username</label>
            {{ form.username }}

            <label for="id_password">Password</label>
            {{ form.password }}

            <button type="submit">Sign In</button>
        </form>

        <div class="back">
            <a href="{% url 'home' %}">Back to Home</a>
        </div>
    </div>
</body>
</html>
